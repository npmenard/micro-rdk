name: Calculate differences

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches: ['main']
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

jobs:
  changes:
    name: Calculate changes
    runs-on: ubuntu-latest
    outputs:
      src-esp32: ${{ steps.filter.outputs.src-esp32 }}
      src-native: ${{ steps.filter.outputs.src-native }}
      src-common: ${{ steps.filter.outputs.src-common }}
      src-servers: ${{ steps.filter.outputs.src-servers }}
      src-cli: ${{ steps.filter.outputs.src-cli }}
      src-ffi: ${{ steps.filter.outputs.src-ffi }}
      src-nmea: ${{ steps.filtser.outputs.src-nmea }}
    steps:
    - name : Checkout main branch code
      if: github.event_name != 'pull_request_target'
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    - name: Check out PR branch code
      if: github.event_name == 'pull_request_target'
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}
        fetch-depth: 2
    - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
    - name: path filter
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          src-esp32:
            - 'micro-rdk/src/esp32/**'
          src-common:
            - 'micro-rdk/src/common/**'
            - 'micro-rdk/src/gen/**'
          src-native:
            - 'micro-rdk/src/native/**'
          src-servers:
            - 'micro-rdk-server/**'
          src-cli:
            - 'micro-rdk-installer/**'
          src-ffi:
            - 'micro-rdk-ffi/**'
          src-nmea:
            - 'micro-rdk-nmea/**'
  dump:
    name: Dump GitHub context
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: export
        env:
          GITHUB_CONTEXT: ${{ toJson(needs.changes) }}
        run: |
          echo "$GITHUB_CONTEXT"
  export:
    name: Export
    needs: [changes]
    uses: ./.github/workflows/sizes.yml
    with:
      input: ${{ needs.changes}}

